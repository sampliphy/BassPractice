<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Practice Generator - Basse</title>
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#121a34;
      --card:rgba(255,255,255,.08);
      --border:rgba(255,255,255,.14);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --shadow:0 18px 50px rgba(0,0,0,.35);
      --radius:22px;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      min-height:100vh;
      background: radial-gradient(1200px 600px at 30% 20%, #26356b 0%, transparent 60%),
                  radial-gradient(900px 500px at 70% 70%, #4b2a6d 0%, transparent 55%),
                  linear-gradient(160deg, var(--bg1), var(--bg2));
      display:flex;
      justify-content:center;
      align-items:center;
      padding:18px;
    }
    .app{
      width:min(920px, 96vw);
      display:grid;
      gap:14px;
    }
    .card{
      background:var(--card);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      border-radius:var(--radius);
      padding:22px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }
    h1{
      margin:0;
      font-weight:800;
      letter-spacing:.3px;
      font-size:20px;
      color:rgba(255,255,255,.9);
    }
    .hint{
      color:var(--muted);
      font-size:13px;
      line-height:1.25;
      text-align:right;
    }
    .center{
      text-align:center;
      padding:26px 18px 18px;
    }
    .label{
      color:var(--muted);
      font-size:14px;
      letter-spacing:.6px;
      text-transform:uppercase;
    }
    .key{
      font-size: clamp(40px, 6vw, 74px);
      font-weight:900;
      margin:10px 0 6px;
      letter-spacing:.5px;
    }
    .prog{
      font-size: clamp(22px, 3.1vw, 40px);
      font-weight:800;
      margin:8px 0 6px;
    }
    .sub{
      color:var(--muted);
      margin-top:10px;
      font-size:14px;
    }
    .instructions-list {
      text-align: left;
      margin: 15px 0 0 0;
      padding-left: 20px;
      list-style-type: none;
    }
    .instructions-list li {
      margin-bottom: 10px;
      font-size: 15px;
      line-height: 1.4;
      color: rgba(255,255,255,0.85);
    }
    .instructions-list b {
      color: #fff;
      margin-right: 8px;
    }
    .buttons{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:14px;
    }
    button{
      border:1px solid var(--border);
      background:rgba(255,255,255,.06);
      color:var(--text);
      border-radius:14px;
      padding:11px 14px;
      font-size:15px;
      cursor:pointer;
      transition: transform .05s ease, background .15s ease;
      min-width: 150px;
    }
    button:hover{ background:rgba(255,255,255,.10); }
    button:active{ transform: translateY(1px); }
    .pillrow{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top:10px;
    }
    .pill{
      border:1px solid var(--border);
      background:rgba(0,0,0,.18);
      padding:8px 10px;
      border-radius:999px;
      font-size:13px;
      color:rgba(255,255,255,.8);
    }
    .settingsHeader{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
    }
    .settingsHeader h2{
      margin:0;
      font-size:14px;
      letter-spacing:.6px;
      text-transform:uppercase;
      color:rgba(255,255,255,.75);
    }
    .settings{
      display:grid;
      gap:12px;
      margin-top:12px;
    }
    .grid{
      display:grid;
      gap:10px;
      grid-template-columns: repeat(12, 1fr);
    }
    .field{
      grid-column: span 6;
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:space-between;
      padding:10px 12px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.05);
      border-radius:16px;
    }
    .field span{
      color:rgba(255,255,255,.8);
      font-size:14px;
    }
    select, input[type="checkbox"]{
      accent-color: white;
    }
    select{
      background:rgba(0,0,0,.18);
      color:var(--text);
      border:1px solid var(--border);
      border-radius:12px;
      padding:8px 10px;
      font-size:14px;
      outline:none;
    }
    .fieldSmall{
      grid-column: span 4;
    }
    .fieldWide{
      grid-column: span 1
